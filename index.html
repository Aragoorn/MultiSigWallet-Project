<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base MultiSig DApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        h2, h3 { text-align: center; }
        button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #059669; }
        .btn-alt { background: #2563eb; }
        .btn-alt:hover { background: #1d4ed8; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; box-sizing: border-box; }
        .status { margin-top: 15px; color: #38bdf8; font-weight: bold; text-align: center; font-size: 14px; word-break: break-all; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <h2>Base MultiSig Dashboard</h2>
    <p style="text-align: center; color: #94a3b8;">Manage Treasury Transactions</p>
    <button id="connectBtn" class="btn-alt">Connect Wallet</button>
    <p id="walletAddress" class="status"></p>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- مرحله 1: ثبت تراکنش -->
    <h3>1. Submit Transaction</h3>
    <label>To Address (Destination):</label>
    <input type="text" id="toAddress" placeholder="0x..." />
    <label>Value (in Ether):</label>
    <input type="text" id="ethValue" placeholder="0.0001" />
    <button id="submitBtn">Submit Transaction</button>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- مرحله 2 و 3: تایید و اجرا -->
    <h3>2 & 3. Confirm & Execute</h3>
    <label>Transaction ID:</label>
    <input type="number" id="txId" placeholder="Transaction ID (e.g., 0)" />
    <div style="display: flex; gap: 10px;">
        <button id="confirmBtn" class="btn-alt" style="flex: 1;">Confirm Tx</button>
        <button id="executeBtn" style="flex: 1; background: #8b5cf6;">Execute Tx</button>
    </div>

    <p id="txStatus" class="status"></p>
</div>

<script>
    let account;
    // آدرس قرارداد مالتی‌سیگ که دیشب دپلوی کردی را اینجا جایگزین کن
    const contractAddress = "0xEe320c28Ad0D1f84C626E779fe8d022E82570b8B"; 

    const connectBtn = document.getElementById("connectBtn");
    const walletAddressP = document.getElementById("walletAddress");
    const txStatusP = document.getElementById("txStatus");

    // چک کردن افزونه ولت
    const getProvider = () => window.ethereum || (window.rabby ? window.rabby : null);

    async function connectWallet() {
        const provider = getProvider();
        if (provider) {
            try {
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                walletAddressP.innerText = `Connected: ${account}`;
                connectBtn.innerText = "Wallet Connected";
                txStatusP.innerText = "";
            } catch (error) {
                txStatusP.innerText = "Connection rejected.";
            }
        } else {
            alert("Please unlock Rabby and refresh!");
        }
    }

    async function sendTx(data) {
        const provider = getProvider();
        if (!account || !provider) { alert("Connect wallet first!"); return; }
        try {
            txStatusP.innerText = "Sending transaction via Rabby...";
            const txHash = await provider.request({
                method: 'eth_sendTransaction',
                params: [{ from: account, to: contractAddress, data: data, value: '0x0' }],
            });
            txStatusP.innerText = `Success! Tx Sent. Hash: ${txHash.substring(0,15)}...`;
        } catch (error) {
            txStatusP.innerText = "Transaction failed or rejected.";
        }
    }

    // 1. تابع Submit
    document.getElementById("submitBtn").addEventListener("click", async () => {
        const to = document.getElementById("toAddress").value;
        const value = document.getElementById("ethValue").value;
        if (!to || !value) { alert("Fill all fields"); return; }
        
        // تبدیل اتر به فرمت هگزا برای ارسال مستقیم
        const weiValue = (parseFloat(value) * 1e18).toString(16).padStart(64, '0');
        const cleanTo = to.toLowerCase().replace("0x", "").padStart(64, '0');
        
        // ساخت دیتای متد submitTransaction
        const data = "0xc64bd20b" + cleanTo + weiValue + "".padStart(64, '0'); 
        await sendTx(data);
    });

    // 2. تابع Confirm
    document.getElementById("confirmBtn").addEventListener("click", async () => {
        const id = document.getElementById("txId").value;
        if (id === "") { alert("Enter Tx ID"); return; }
        const hexId = parseInt(id).toString(16).padStart(64, '0');
        const data = "0xc2fdd26c" + hexId;
        await sendTx(data);
    });

    // 3. تابع Execute
    document.getElementById("executeBtn").addEventListener("click", async () => {
        const id = document.getElementById("txId").value;
        if (id === "") { alert("Enter Tx ID"); return; }
        const hexId = parseInt(id).toString(16).padStart(64, '0');
        const data = "0x3e3f3d14" + hexId;
        await sendTx(data);
    });

    connectBtn.addEventListener("click", connectWallet);
</script>

</body>
</html>
